<!-- Delete from LocalStorage using Json -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Data</title>
</head>
<body>
    <h2>Delete Data from LocalStorage</h2>
    <script>
        let users = [
            {
                fname: "het",
                lname: "Patel"
            },
            {
                fname: "krish",
                lname: "patel"
            },
            {
                fname: "dipak",
                lname: "Patel"
            }
        ];

        // Store Data
        localStorage.setItem("users", JSON.stringify(users));

        // Delete Raj
        var tempUsers = JSON.parse(localStorage.getItem("users")).filter((data) => {
            return data.fname != "het";
        });

        // Save Updated Data
        localStorage.setItem("users", JSON.stringify(tempUsers));

        // View Result
        console.log(JSON.parse(localStorage.getItem("users")));

    </script>
</body>
</html>
