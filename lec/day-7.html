<body>
    <h2>Local Storage Example</h2>
    <script>
        let users = [
            {
                fname: "het",
                lname: "Patel"
            },
            {
                fname: "krish",
                lname: "patel"
            },
            {
                fname: "dipak",
                lname: "Patel"
            }
        ];

        // 1.
        // How to Add New Data in a Local Storage
        // localStorage.setItem("fname", "het");
        // localStorage.setItem(
        //     "users",
        //     JSON.stringify(users));

        // 2
        // How to View Data
        console.log(
            JSON.parse(localStorage.getItem("users")));
        console.log(localStorage);

        // 3 Delete
        // var tempUsers = JSON.parse
        //    (localStorage.getItem("users")).filter((data) => {
        //     return data.fname != "het";
        // }); // array
        
        // 4. Update Data
        var tempUsers = JSON.parse(
            localStorage.getItem("users")
        ).map((data) => {

            return (
                (data.fname == "krish")
                    ? {
                        ...data,
                        fname: "Sahil"
                    }
                    : data
            );

        }); // array

        localStorage.setItem(
            "users",
            JSON.stringify(tempUsers));
