<!DOCTYPE html>
<html>
<head>
    <title>To Do List</title>
    <link rel="stylesheet" href="./date-6.css">
</head>
<body>

    <div class="container">
    <h1>To Do List</h1>
    <input type="text" id="taskInput" placeholder="Write your task">
    <button id="addBtn">Add</button>
       <ul id="taskList">
            <li class="no-task">No Task</li>
        </ul>
    <p>
            Total :
            <span id="totalTask">0</span>
        </p>
        <p>
            Completed :
            <span id="completedTask">0</span>
        </p>
        <p>
            Pending :
            <span id="pendingTask">0</span>
        </p>
    </div>
    <script src="./date-6.js"></script>
</body>
</html>
