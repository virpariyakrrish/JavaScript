<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="./date-30.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div class="main">
        <div class="slider-container">
            <button class="arrow left-arrow"><i class="fa-solid fa-angle-left"></i></button>

            <img src="./img1.jpg" alt="Slider Image" id="sliderImage" class="slider-image">
            
            <button class="arrow right-arrow"><i class="fa-solid fa-angle-right"></i> </button>

            <div class="counter" id="imageCounter">
                Image 1 of 5
            </div>
        </div>

        <div class="controls">
            <button class="btn prev-btn">
                Previous
            </button>
            <button class="btn next-btn">
                Next
            </button>
        </div>
    </div>

    <script src="./date-30.js"></script>
</body>
</html>
