<!-- Library Management System -->
 
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management</title>

<style>

table{
    width:60vw;
    margin:auto;
    display:none;
    flex-direction:column;
    gap:10px;
}

thead,tbody{
    display:flex;
    flex-direction:column;
    gap:10px;
}

tr{
    display:flex;
    gap:10px;
}

td,th{
    flex-grow:1;
    border:2px solid blue;
}

table,tr,td,th{
    font-size:22px;
    font-family:Calibri;
    color:darkblue;
}

section{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:20px;
    flex-wrap:wrap;
} 

button{
    padding:10px 20px;
    font-size:20px;
    background:black;
    color:white;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.1);
}

.show{
    display:flex;
}

    </style>
</head>
<body>

    <main>Total Books : </main>

    <section>
        <button class="display">Display Books</button>
        <button class="add">Add Book</button>
        <button class="issue">Issue Book</button>
        <button class="return">Return Book</button>
        <button class="delete">Delete Book</button>
        <button class="available">Book Availability</button>
    </section>

    <table>
        <thead>
    <tr>
        <th>Book ID</th>
        <th>Book Name</th>
        <th>Author</th>
        <th>Category</th>
        <th>Quantity</th>
        <th>Status</th>
    </tr>
        </thead>

        <tbody>
        </tbody>

    </table>
    <script src="date-25.js"></script>
</body>
</html>
